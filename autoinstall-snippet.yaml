# autoinstall-snippet.yaml — drop-in for the client's Ubuntu 24.04 autoinstall.
#
# Brings up vanilla Langflow (product only, no CloudHosting panel/Caddy) for ONE client
# on first boot. Clones the checkout + installs a first-boot oneshot; the actual
# `docker compose up` + secret generation runs in firstboot.sh.
#
# The provisioner substitutes {panel_password} -> it becomes the Langflow admin
# password (login: admin / <that password>). LANGFLOW_SECRET_KEY is auto-generated by
# firstboot. Langflow serves its own UI on http://<host>:7860; the LLM provider/key is
# set INSIDE Langflow (avots = an OpenAI-compatible provider).

autoinstall:
  version: 1

  packages:
    - git
    - docker.io
    - docker-compose-v2
    - ca-certificates

  late-commands:
    - ["curtin", "in-target", "--", "bash", "-c", "apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y git docker.io docker-compose-v2 ca-certificates"]
    - ["curtin", "in-target", "--", "bash", "-c", "test -d /opt/langflow-vm || git clone --depth 1 https://github.com/cloudhostinglv/langflow-vm.git /opt/langflow-vm"]
    - ["curtin", "in-target", "--", "bash", "-c", "umask 077 && printf 'LANGFLOW_ADMIN_PASSWORD=%s\\n' '{panel_password}' > /opt/langflow-vm/.env"]
    - ["curtin", "in-target", "--", "chmod", "0600", "/opt/langflow-vm/.env"]
    - ["curtin", "in-target", "--", "chmod", "0755", "/opt/langflow-vm/firstboot.sh"]
    - ["curtin", "in-target", "--", "cp", "/opt/langflow-vm/langflow-firstboot.service", "/etc/systemd/system/langflow-firstboot.service"]
    - ["curtin", "in-target", "--", "systemctl", "enable", "langflow-firstboot.service"]

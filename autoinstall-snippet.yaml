# autoinstall-snippet.yaml — drop-in for the client's Ubuntu 24.04 autoinstall.
#
# Brings up the turnkey Langflow stack (product + setup panel + Caddy/TLS) for ONE
# client on first boot. Prepares the checkout + compose-level secret + a first-boot
# oneshot; the actual `docker compose up` runs in firstboot.sh on the first real boot.
#
# The provisioner substitutes {panel_password}. PANEL_DOMAIN is left blank so
# firstboot.sh auto-derives vps-<o3>-<o4>.cloudhosting.lv. LANGFLOW_SECRET_KEY is
# auto-generated by firstboot.sh; the Langflow login is admin / PANEL_PASSWORD; the LLM
# provider/key is set by the client INSIDE Langflow's own UI (it's a builder).

autoinstall:
  version: 1

  packages:
    - git
    - docker.io
    - docker-compose-v2
    - ca-certificates

  late-commands:
    - ["curtin", "in-target", "--", "bash", "-c", "apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y git docker.io docker-compose-v2 ca-certificates"]
    - ["curtin", "in-target", "--", "bash", "-c", "test -d /opt/langflow-vm || git clone --depth 1 https://github.com/cloudhostinglv/langflow-vm.git /opt/langflow-vm"]
    - ["curtin", "in-target", "--", "bash", "-c", "umask 077 && printf 'PANEL_PASSWORD=%s\\nPANEL_DOMAIN=\\n' '{panel_password}' > /opt/langflow-vm/.env"]
    - ["curtin", "in-target", "--", "chmod", "0600", "/opt/langflow-vm/.env"]
    - ["curtin", "in-target", "--", "chmod", "0755", "/opt/langflow-vm/firstboot.sh"]
    - ["curtin", "in-target", "--", "cp", "/opt/langflow-vm/langflow-firstboot.service", "/etc/systemd/system/langflow-firstboot.service"]
    - ["curtin", "in-target", "--", "systemctl", "enable", "langflow-firstboot.service"]

# Langflow (MIT) per-client single-tenant VM — turnkey builder stack.
#   langflow -> the builder product UI/API (port 7860). Served on :443 by Caddy.
#   panel    -> CloudHosting setup panel (ai-panel, PRODUCT=langflow). REDUCED builder
#               surface: login-gated landing + "Open Langflow" + avots status. :8443.
#   caddy    -> ONE Let's Encrypt cert for ${PANEL_DOMAIN}, TWO sites:
#                :443  -> langflow:7860 (the product)   <- "Open Langflow" target
#                :8443 -> panel:8080    (our panel)     <- panel is ALWAYS on 8443
#              + :80 for ACME HTTP-01.
#
# CONVENTION: panel on :8443, product on :443 (panel openProductUrl = https://${PANEL_DOMAIN}).
# Langflow is a BUILDER: the client configures the LLM provider inside Langflow's own UI.
# Langflow login is its own superuser (admin / PANEL_PASSWORD, reused) — the UI on :443
# is public, so product auth is required. LANGFLOW_SECRET_KEY is auto-generated by firstboot.

x-restart: &restart unless-stopped

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  langflow:
    # PIN — re-verify before baking. 1.9.6 = newest stable as of 2026-06-05.
    # AVOID 1.6.0–1.6.3 (upstream regressions).
    image: langflowai/langflow:1.9.6
    container_name: langflow
    restart: *restart
    environment:
      LANGFLOW_HOST: "0.0.0.0"
      LANGFLOW_PORT: "7860"
      LANGFLOW_CONFIG_DIR: "/app/langflow"
      LANGFLOW_DATABASE_URL: "sqlite:////app/langflow/langflow.db"
      # No anonymous access; the client logs into Langflow with admin / PANEL_PASSWORD.
      LANGFLOW_AUTO_LOGIN: "false"
      LANGFLOW_SUPERUSER: "admin"
      LANGFLOW_SUPERUSER_PASSWORD: "${PANEL_PASSWORD}"
      # Encrypts stored secrets/global vars + signs JWTs. Stable per VM (firstboot-gen).
      LANGFLOW_SECRET_KEY: "${LANGFLOW_SECRET_KEY}"
      # Optional turnkey avots: expose the key as a Credential global var + default base
      # (empty if no AVOTS_API_KEY set — the client adds it inside Langflow).
      LANGFLOW_VARIABLES_TO_GET_FROM_ENVIRONMENT: "AVOTS_API_KEY"
      AVOTS_API_KEY: "${AVOTS_API_KEY:-}"
      OPENAI_API_BASE: "https://api.avots.ai/openai/v1"
    volumes:
      - langflow-data:/app/langflow
    expose:
      - "7860"
    networks:
      - web
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:7860/health_check').status==200 else 1)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging: *logging
    # No docker.sock anywhere: a flow can run arbitrary Python.

  panel:
    image: ghcr.io/cloudhostinglv/ai-panel:latest
    container_name: langflow-panel
    restart: *restart
    user: "1000:1000"
    depends_on:
      - langflow
    environment:
      PRODUCT: "langflow"
      PANEL_PASSWORD: "${PANEL_PASSWORD}"
      PANEL_REQUIRE_AUTH: "1"
      PANEL_PORT: "8080"
      PANEL_DOMAIN: "${PANEL_DOMAIN}"
      AVOTS_API_KEY: "${AVOTS_API_KEY:-}"
      HOME: "/paneldata"
    volumes:
      - ./paneldata:/paneldata
    expose:
      - "8080"
    networks:
      - web
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging: *logging

  caddy:
    image: caddy:2.8-alpine
    container_name: langflow-caddy
    restart: *restart
    depends_on:
      - langflow
      - panel
    environment:
      PANEL_DOMAIN: "${PANEL_DOMAIN}"
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - web
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging: *logging

networks:
  web:
    driver: bridge

volumes:
  langflow-data:
  caddy-data:
  caddy-config:

# Langflow (MIT) per-client single-tenant VM — vanilla product, no extra panel.
#
# Decision (2026-06-07): builders run their OWN standard UI on their OWN standard port,
# WITHOUT the CloudHosting panel/Caddy layer. The customer reaches Langflow directly:
#   http://<vps-host>:7860   (login: admin / <LANGFLOW_ADMIN_PASSWORD>)
# Langflow needs a superuser password (no first-run wizard), supplied via .env. The LLM
# provider/key is configured INSIDE Langflow (avots = OpenAI-compatible base URL).
#
# NOTE: served over plain HTTP on :7860 (no TLS here, by design). Put a TLS terminator
# in front if you want HTTPS.

x-restart: &restart unless-stopped

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  langflow:
    # PIN — re-verify before baking. 1.9.6 = newest stable as of 2026-06-05.
    # AVOID 1.6.0–1.6.3 (upstream regressions).
    image: langflowai/langflow:1.9.6
    container_name: langflow
    restart: *restart
    environment:
      LANGFLOW_HOST: "0.0.0.0"
      LANGFLOW_PORT: "7860"
      LANGFLOW_CONFIG_DIR: "/app/langflow"
      LANGFLOW_DATABASE_URL: "sqlite:////app/langflow/langflow.db"
      # No anonymous access; log in with admin / LANGFLOW_ADMIN_PASSWORD.
      LANGFLOW_AUTO_LOGIN: "false"
      LANGFLOW_SUPERUSER: "admin"
      LANGFLOW_SUPERUSER_PASSWORD: "${LANGFLOW_ADMIN_PASSWORD}"
      # Encrypts stored secrets/global vars + signs JWTs. Stable per VM (firstboot-gen).
      LANGFLOW_SECRET_KEY: "${LANGFLOW_SECRET_KEY}"
    volumes:
      - langflow-data:/app/langflow
    ports:
      - "7860:7860"           # the product's own standard port (no Caddy / no :443 remap)
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:7860/health_check').status==200 else 1)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging: *logging
    # No docker.sock anywhere: a flow can run arbitrary Python.

volumes:
  langflow-data:
